
<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Simple Coffee App</title>

    <link rel="stylesheet" href="https://pyscript.net/releases/2026.7.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2026.7.1/core.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Chemex Coffee Instructions</h1>

    <form onsubmit="return false">
        <label for="cups">How many cups of coffee do you want?</label><br>
        <input type="number" id="cups" name="cups" min="1" max="4" value="2" required><br>
        <label for="ratio">What's your preferred water ratio?</label><br>
        <input type="number" id="ratio" name="ratio" min="15" max="17" value="17" required><br>

        <input type="submit" id="btn-form" value="Brew">
    </form>
    <div id="error-message" style="color: red; margin-top: 10px;"></div>

    <h2>Instructions</h2>
    <div id="output"></div>
    <div id="instructions-container">
      <div id="step1" class="instruction-step"></div>
      <div id="step2" class="instruction-step"></div>
      <div id="step3" class="instruction-step"></div>
    </div>

    <script type="py" src="./coffee_logic.py" config="./pyscript.json"></script>
</body>
</html>
